# hexa.toml — hexa-pet standalone package manifest
#
# Spec: shared/hexa-lang/hexa-toml-spec.json (version 1.0.0)
# Distribution target: hx install hexa-pet
# Provenance: extracted from canon/domains/pets/ on 2026-05-06
#             (n6-arch SHA c0f1f570 — sister of hexa-bio standalone pattern)

[package]
name = "hexa-pet"
version = "1.0.0"
entry = "cli/hexa-pet.hexa"
description = "반려동물 toolkit — cat·dog food/litter/toy 5-verb. n=6 invariant lattice. Consumer-friendly self-contained substrate (spec-first; working .hexa CLI TBD)."
license = "MIT"
authors = ["박민우 <nerve011235@gmail.com>"]
repository = "https://github.com/dancinlab/hexa-pet"
homepage = "https://github.com/dancinlab/hexa-pet"
readme = "README.md"
keywords = ["pet", "cat", "dog", "litter", "food", "toy", "hexa-family", "n6-invariant", "consumer-product"]
categories = ["consumer-products", "companion-animals", "material-science"]

[[bin]]
name = "hexa-pet"
path = "cli/hexa-pet.hexa"

[test]
runner = "hexa"
files = [
    "tests/test_selftest.hexa",
]

# ── hx install hook ───────────────────────────────────────
# install.hexa runs under hx package manager (hexa-lang) at install time.
# Phases: pre   → no external deps (pure spec docs).
#         post  → quick selftest (5-verb count check; warn-only).
[scripts]
install = "install.hexa"

# ── Verb manifest (5-verb pet substrate) ──────────────────
# All 5 verbs ship as spec docs (cat-food.md / cat-litter.md / cat-toy.md /
# dog-food.md / dog-toy.md) extracted from canon@c0f1f570. Working
# .hexa CLI dispatchers are placeholders printing the spec headline; full
# numerical implementations TBD per per-verb falsifier deadlines.
[verbs]
hexa = [
    "cat_food/cat-food.md",
    "cat_litter/cat-litter.md",
    "cat_toy/cat-toy.md",
    "dog_food/dog-food.md",
    "dog_toy/dog-toy.md",
]

# ── Dependencies ───────────────────────────────────────────
# hexa stdlib only — pure spec substrate; zero Python / external deps.
[dependencies]
hexa-lang = ">=1.0.0"

# ── Closure provenance (raw#10 honest C3) ─────────────────
# v1.0.0 closure: 5 verbs spec-only (no working numerical impl yet).
# 100% spec-first closure: verify/run_all.hexa = 4/4 PASS.
# Honest scope: consumer-friendly self-contained pet-care substrate;
# physical-limit anchors live in the per-verb .md docs (AAFCO + Atwater +
# Maillard + bentonite Wyoming + Kevlar + nepetalactone Antoine + Lindner
# canine bite mechanics). n=6 invariant lattice projections per-verb.
[closure]
verbs_total = 5
verbs_wired = 0
verbs_spec_only = 5
verdict = "SPEC_FIRST"
closure_pct = 100
verify_scripts = 4
verify_status = "4/4 PASS"
extracted_from = "canon/domains/pets/ @ c0f1f570 (2026-05-06)"

# Verify scripts (sister of hexa-matter verify/ pattern):
#   verify/spec_presence.hexa         — 5/5 verb spec doc presence
#   verify/lattice_arithmetic.hexa    — n=6 self-consistency (aux only, LATTICE_POLICY §1.3)
#   verify/real_limits_anchor.hexa    — AVMA/AAHA + AAFCO + FDA-CVM + NRC 2006 + ANSI Z136.1
#   verify/closure_consistency.hexa   — CLI/toml/README/AGENTS scoreboard cross-check
# Run:
#   hexa run verify/run_all.hexa      # exit 0 = 4/4 PASS = 100% closure
[closure.verify]
spec_presence = true
lattice_arithmetic = true
real_limits_anchor = true
closure_consistency = true

# Real-limits anchors (LATTICE_POLICY §1.2 — engineering thresholds):
#   • Veterinary medicine — AVMA / AAHA guidelines
#   • Pet nutrition       — AAFCO 2024 + NRC 2006
#   • Pet pharmaceuticals — FDA-CVM
# Honest disclosure (LATTICE_POLICY §3.3 + raw#10 C3):
#   • Pet-medical claims STRICTLY UNPROVEN without veterinary IRB.
#   • No veterinary advice — "consult licensed veterinarian".
#   • Pet-food/pharma/retail brands (Hill's, Royal Canin, Purina, Zoetis,
#     Boehringer, Elanco, Petco, Chewy) use THEIR OWN specs — no lattice-fit.
[closure.real_limits]
veterinary_medicine = "AVMA / AAHA practice guidelines"
pet_nutrition = "AAFCO 2024 + NRC 2006 Nutrient Requirements of Dogs and Cats"
pet_pharmaceuticals = "FDA-CVM (Center for Veterinary Medicine)"
material_anchors = "Wyoming Na-bentonite Grim 1978 · nepetalactone Todd 1962 · canine bite Ellis 2008 · ANSI Z136.1 laser MPE"
veterinary_advice = "NONE — consult licensed veterinarian"
external_brands_lattice_fit = "FORBIDDEN per LATTICE_POLICY §3.3"

# ── Scope honesty (raw#10 C3) ─────────────────────────────
[scope]
honest_scope = "5-verb consumer-pet-care substrate (cat-food / cat-litter / cat-toy / dog-food / dog-toy). Spec-first: each verb is a peer-citable .md doc with physical-limit anchors + falsifier preregister. Working .hexa CLI dispatcher is a placeholder."
not_scope = ["working numerical sandboxes (TBD per per-verb F-*-MVP-* gates)", "manufacturing pipelines", "regulatory submission (AAFCO / WSAVA / FAO endorsement = future work)", "in-vivo lifespan / behavior trials (out-of-repo)"]
n6_lattice_caveat = "n=6 invariant (σ(6)=12, τ(6)=4, φ(6)=2, J₂=24) projected per-verb in spec docs (e.g., cat-litter σ=12 bentonite swell-ratio; cat-food σ=12 raw-strategy registry). Empirical Bayesian audit pending per F-*-MVP-* deadlines (2026-07-30 ~ 2031)."

# ── Cost profile ──────────────────────────────────────────
[cost]
mac_local_default = "$0 (pure spec docs + placeholder dispatcher)"
mvp_pilots = "$ (per-verb 1 kg / 100 kg pilot batch + lab measurements per F-*-MVP-* gates)"
